name: Deploy production

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ecopye-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy pro.ecopye.fr
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Verify deployment configuration
        env:
          VPS_HOST: ${{ secrets.ECOPYE_VPS_HOST }}
          VPS_USER: ${{ secrets.ECOPYE_VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.ECOPYE_VPS_SSH_KEY }}
        run: |
          test -n "$VPS_HOST" || { echo "Missing ECOPYE_VPS_HOST"; exit 1; }
          test -n "$VPS_USER" || { echo "Missing ECOPYE_VPS_USER"; exit 1; }
          test -n "$VPS_SSH_KEY" || { echo "Missing ECOPYE_VPS_SSH_KEY"; exit 1; }

      - name: Configure secure SSH access
        env:
          VPS_HOST: ${{ secrets.ECOPYE_VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.ECOPYE_VPS_SSH_KEY }}
        run: |
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$VPS_SSH_KEY" > "$HOME/.ssh/ecopye_deploy"
          chmod 600 "$HOME/.ssh/ecopye_deploy"
          ssh-keyscan -H "$VPS_HOST" >> "$HOME/.ssh/known_hosts"

      - name: Deploy the latest approved version
        env:
          VPS_HOST: ${{ secrets.ECOPYE_VPS_HOST }}
          VPS_USER: ${{ secrets.ECOPYE_VPS_USER }}
        run: |
          ssh -i "$HOME/.ssh/ecopye_deploy" "$VPS_USER@$VPS_HOST" <<'EOF'
          set -e
          cd /opt/ECOPYE-PRO-CHANTIER
          test -z "$(git status --porcelain)" || {
            echo "Deployment stopped: uncommitted server changes are present."
            git status --short --branch
            exit 1
          }
          git pull --ff-only origin master
          npm install
          npm run build
          pm2 reload ecopye-pro
          EOF
